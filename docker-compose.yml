services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    command: npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  node_modules:
  next_cache:
